<script>
        // Simple micro-interaction for the upload area
        const uploadArea = document.querySelector('.glass-card.cursor-pointer');
        uploadArea.addEventListener('click', () => {
            // Simulate triggering a file input
            console.log('File picker triggered');
            uploadArea.classList.add('active-glow');
            setTimeout(() => uploadArea.classList.remove('active-glow'), 500);
        });

        // Dynamic text area resize or feedback could go here
        const textarea = document.querySelector('textarea');
        textarea.addEventListener('input', () => {
            if (textarea.value.length > 0) {
                textarea.classList.add('border-primary');
            } else {
                textarea.classList.remove('border-primary');
            }
        });

        // Backend API Wiring
        const analyzeBtn = document.getElementById('analyze-btn');
        const contentInput = document.getElementById('content-input');
        const quizToggle = document.querySelector('input[type="checkbox"]');

        analyzeBtn.addEventListener('click', async () => {
            const text = contentInput.value.trim();
            if (!text) {
                alert("분석할 텍스트를 붙여넣어주세요!");
                return;
            }
            
            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> AI가 열일 중...';
            
            try {
                const response = await fetch('/api/parse/text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, generate_ai_quiz: quizToggle.checked })
                });
                
                if (!response.ok) throw new Error(`서버 에러: ${response.status}`);
                
                const data = await response.json();
                sessionStorage.setItem('parseResult', JSON.stringify(data));
                window.location.href = '/reading';
            } catch (error) {
                console.error(error);
                alert("분석 중 오류가 발생했습니다: " + error.message);
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = '<span class="material-symbols-outlined" style="font-variation-settings: \'FILL\' 1;">auto_awesome</span> 분석 시작하기';
            }
        });
    </script>
