<script>
        // Audio Visualizer Simulation
        const visualizer = document.getElementById('visualizer');
        const statusText = document.getElementById('status-text');
        const micToggle = document.getElementById('mic-toggle');
        const barCount = 32;
        const bars = [];

        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'visualizer-bar bg-primary/60';
            const height = 10 + Math.random() * 80;
            bar.style.height = `${height}%`;
            visualizer.appendChild(bar);
            bars.push(bar);
        }

        let isListening = false;

        function animateVisualizer() {
            bars.forEach((bar, index) => {
                let modifier = isListening ? 0.3 : 1.0;
                let randomHeight = 10 + Math.random() * (isListening ? 40 : 90);
                // Create a wave effect
                const wave = Math.sin((Date.now() / 200) + index * 0.5) * 20 + 40;
                bar.style.height = `${(randomHeight * 0.4 + wave * 0.6) * modifier}%`;
                
                // Color shift
                bar.className = `visualizer-bar ${isListening ? 'bg-tertiary/40' : 'bg-primary/60'}`;
            });
            requestAnimationFrame(animateVisualizer);
        }

        animateVisualizer();

        // Toggle Simulation
        micToggle.addEventListener('click', () => {
            isListening = !isListening;
            if (isListening) {
                statusText.innerText = '듣고 있습니다...';
                statusText.classList.replace('text-primary', 'text-tertiary');
                micToggle.classList.replace('bg-primary', 'bg-tertiary');
                micToggle.classList.replace('text-on-primary', 'text-on-tertiary');
            } else {
                statusText.innerText = '튜터가 말하는 중입니다...';
                statusText.classList.replace('text-tertiary', 'text-primary');
                micToggle.classList.replace('bg-tertiary', 'bg-primary');
                micToggle.classList.replace('text-on-tertiary', 'text-on-primary');
            }
        });
    </script>
